name: Security

# Leak gate for open development: every push and PR is scanned for secrets, so
# an accidental credential is caught before it becomes part of public history.
# This replaces the one-shot export scan that guarded the old private→public
# flow — the safety net stays, the manual step is gone.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    name: Secret scan (gitleaks)
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history on push so the scan covers newly pushed commits, not
          # just the tip. PRs scan the PR range by default.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks detect --source . \
              --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
              --redact --verbose
          else
            gitleaks detect --source . --redact --verbose
          fi
